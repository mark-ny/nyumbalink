name: NyumbaLink CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ──────────────────────────────────────────────────────────────────────
#  Job 1 — Backend tests (runs on every push + PR)
# ──────────────────────────────────────────────────────────────────────
jobs:
  test-backend:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nyumbalink_test
          POSTGRES_USER: nyumbalink
          POSTGRES_PASSWORD: testpassword
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov coverage

      - name: Run tests with coverage
        env:
          FLASK_ENV: testing
          DATABASE_URL: postgresql://nyumbalink:testpassword@localhost:5432/nyumbalink_test
          SECRET_KEY: test-secret-key-ci
          JWT_SECRET_KEY: test-jwt-secret-ci
          REDIS_URL: ""
          ELASTICSEARCH_URL: ""
          CLOUDINARY_CLOUD_NAME: test
          CLOUDINARY_API_KEY: test
          CLOUDINARY_API_SECRET: test
          MPESA_CONSUMER_KEY: test
          MPESA_CONSUMER_SECRET: test
          MPESA_SHORTCODE: "174379"
          MPESA_PASSKEY: test
          MPESA_CALLBACK_URL: http://localhost/callback
          MAIL_SUPPRESS_SEND: "true"
          LISTING_FEE_KES: "500"
        run: |
          cd ..
          python -m pytest tests/ \
            --cov=backend \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short \
            -q

      - name: Upload coverage to Codecov
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ──────────────────────────────────────────────────────────────────
  #  Job 2 — Frontend build check
  # ──────────────────────────────────────────────────────────────────
  test-frontend:
    name: 🏗️ Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        env:
          REACT_APP_API_URL: https://nyumbalink-api.onrender.com/api
          REACT_APP_SITE_NAME: NyumbaLink
          REACT_APP_SITE_URL: https://nyumbalink.vercel.app
          GENERATE_SOURCEMAP: "false"
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run build

      - name: Check bundle size
        run: |
          du -sh build/
          # Warn if JS bundle > 5 MB
          JS_SIZE=$(find build/static/js -name '*.js' | xargs wc -c | tail -1 | awk '{print $1}')
          if [ "$JS_SIZE" -gt "5242880" ]; then
            echo "⚠️  JS bundle exceeds 5 MB — consider code splitting"
          else
            echo "✅ Bundle size OK"
          fi

  # ──────────────────────────────────────────────────────────────────
  #  Job 3 — Deploy backend to Render  (main branch only)
  # ──────────────────────────────────────────────────────────────────
  deploy-backend:
    name: 🚀 Deploy → Render
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render deploy hook
        run: |
          echo "Deploying backend to Render..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          if [ "$HTTP_STATUS" -eq 200 ] || [ "$HTTP_STATUS" -eq 201 ]; then
            echo "✅ Render deploy triggered (HTTP $HTTP_STATUS)"
          else
            echo "❌ Render deploy hook returned HTTP $HTTP_STATUS"
            exit 1
          fi

      - name: Wait for Render to become healthy
        run: |
          echo "Waiting for API health check..."
          MAX_ATTEMPTS=30
          ATTEMPT=0
          until curl -sf https://nyumbalink-api.onrender.com/api/health > /dev/null 2>&1; do
            ATTEMPT=$((ATTEMPT + 1))
            if [ $ATTEMPT -ge $MAX_ATTEMPTS ]; then
              echo "❌ API did not become healthy after ${MAX_ATTEMPTS} attempts"
              exit 1
            fi
            echo "  Attempt $ATTEMPT/$MAX_ATTEMPTS — sleeping 10s..."
            sleep 10
          done
          echo "✅ API is healthy"

  # ──────────────────────────────────────────────────────────────────
  #  Job 4 — Deploy frontend to Vercel  (main branch only)
  # ──────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: 🌐 Deploy → Vercel
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: vercel-deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed to: $DEPLOY_URL"

      - name: Comment deploy URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Preview deployment:** ${{ steps.vercel-deploy.outputs.deploy_url }}`
            })

  # ──────────────────────────────────────────────────────────────────
  #  Job 5 — Post-deploy smoke test
  # ──────────────────────────────────────────────────────────────────
  smoke-test:
    name: 💨 Smoke Tests
    needs: [deploy-backend, deploy-frontend]
    runs-on: ubuntu-latest

    steps:
      - name: API health check
        run: |
          RESPONSE=$(curl -sf https://nyumbalink-api.onrender.com/api/health)
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"status":"ok"' && echo "✅ Health OK" || exit 1

      - name: API properties endpoint
        run: |
          curl -sf https://nyumbalink-api.onrender.com/api/properties \
            -H "Accept: application/json" | grep -q '"pagination"' \
            && echo "✅ Properties endpoint OK" || exit 1

      - name: Frontend loads
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" https://nyumbalink.vercel.app)
          [ "$HTTP" -eq 200 ] && echo "✅ Frontend OK" || \
            (echo "❌ Frontend returned HTTP $HTTP" && exit 1)

      - name: Swagger UI loads
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            https://nyumbalink-api.onrender.com/api/docs)
          [ "$HTTP" -eq 200 ] && echo "✅ Swagger UI OK" || \
            echo "⚠️  Swagger returned HTTP $HTTP (non-fatal)"
