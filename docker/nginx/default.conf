# ─────────────────────────────────────────────
#  NyumbaLink — Nginx Virtual Host
# ─────────────────────────────────────────────

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name nyumbalink.co.ke www.nyumbalink.co.ke;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS main server
server {
    listen 443 ssl http2;
    server_name nyumbalink.co.ke www.nyumbalink.co.ke;

    # ── SSL ────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/nyumbalink.co.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nyumbalink.co.ke/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Security headers ───────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options            "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options     "nosniff"                             always;
    add_header X-XSS-Protection           "1; mode=block"                       always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy         "geolocation=(self)"                  always;

    # ── SEO: canonical www redirect ────────────
    if ($host = www.nyumbalink.co.ke) {
        return 301 https://nyumbalink.co.ke$request_uri;
    }

    client_max_body_size 20M;

    # ── API proxy ──────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # CORS headers for API
        add_header Access-Control-Allow-Origin  "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # Stricter rate limit on auth endpoints
    location /api/auth/ {
        limit_req zone=auth burst=5 nodelay;

        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Swagger UI ─────────────────────────────
    location /api/docs {
        proxy_pass http://api_backend/api/docs;
        proxy_set_header Host $host;
    }

    # ── SEO: sitemap & robots ──────────────────
    location = /robots.txt {
        proxy_pass http://api_backend/api/seo/robots.txt;
        proxy_set_header Host $host;
    }

    location = /sitemap.xml {
        proxy_pass http://api_backend/api/seo/sitemap.xml;
        proxy_set_header Host $host;
    }

    # ── Static assets with long cache ─────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;

        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── React SPA catch-all ────────────────────
    location / {
        proxy_pass         http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SPA fallback
        proxy_intercept_errors on;
        error_page 404 = @spa_fallback;
    }

    location @spa_fallback {
        proxy_pass http://frontend_app/index.html;
        proxy_set_header Host $host;
    }
}
