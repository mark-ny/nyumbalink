services:
  - type: web
    name: nyumbalink-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: |
      flask db upgrade || true && gunicorn app:app \
        --bind 0.0.0.0:$PORT \
        --workers 1 \
        --timeout 120 \
        --keep-alive 5 \
        --max-requests 500 \
        --access-logfile - \
        --error-logfile -

    healthCheckPath: /api/health
    autoDeploy: true
    branch: main

    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_ENVIRONMENT
        value: sandbox
      - key: MPESA_CALLBACK_URL
        sync: false
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_DIR
        value: /tmp/logs
      - key: DEFAULT_PAGE_SIZE
        value: "12"
      - key: MAX_PAGE_SIZE
        value: "50"
      - key: LISTING_FEE_KES
        value: "500"
      - key: ELASTICSEARCH_URL
        sync: false
