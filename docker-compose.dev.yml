version: "3.9"

# ─────────────────────────────────────────────
#  Development overrides
#  Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# ─────────────────────────────────────────────

services:

  api:
    build:
      target: development
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: "1"
    volumes:
      - ./backend:/app          # live-reload
      - /app/__pycache__
    command: flask run --host=0.0.0.0 --port=5000 --reload
    ports:
      - "5000:5000"             # expose directly in dev

  frontend:
    build:
      target: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      REACT_APP_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    command: npm start

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  elasticsearch:
    ports:
      - "9200:9200"
