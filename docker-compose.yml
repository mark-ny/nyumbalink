version: "3.9"

# ─────────────────────────────────────────────
#  NyumbaLink – Full Stack Docker Compose
#  Services: api · frontend · postgres · redis
#            elasticsearch · nginx
# ─────────────────────────────────────────────

x-restart: &restart
  restart: unless-stopped

x-logging: &logging
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "5"

services:

  # ── PostgreSQL ──────────────────────────────
  postgres:
    image: postgres:16-alpine
    <<: [*restart, *logging]
    container_name: nyumbalink_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nyumbalink}
      POSTGRES_USER: ${POSTGRES_USER:-nyumbalink}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nyumbalink} -d ${POSTGRES_DB:-nyumbalink}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nyumbalink_net

  # ── Redis ────────────────────────────────────
  redis:
    image: redis:7-alpine
    <<: [*restart, *logging]
    container_name: nyumbalink_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nyumbalink_net

  # ── Elasticsearch ───────────────────────────
  elasticsearch:
    image: elasticsearch:8.13.0
    <<: [*restart, *logging]
    container_name: nyumbalink_es
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - nyumbalink_net

  # ── Flask API ───────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    <<: [*restart, *logging]
    container_name: nyumbalink_api
    env_file:
      - ./backend/.env
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-nyumbalink}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-nyumbalink}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      ELASTICSEARCH_URL: http://elasticsearch:9200
    volumes:
      - api_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    expose:
      - "5000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - nyumbalink_net

  # ── React Frontend ──────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-/api}
        REACT_APP_GOOGLE_MAPS_API_KEY: ${REACT_APP_GOOGLE_MAPS_API_KEY:-}
    <<: [*restart, *logging]
    container_name: nyumbalink_frontend
    expose:
      - "3000"
    depends_on:
      - api
    networks:
      - nyumbalink_net

  # ── Nginx Reverse Proxy ─────────────────────
  nginx:
    image: nginx:1.27-alpine
    <<: [*restart, *logging]
    container_name: nyumbalink_nginx
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_logs:/var/log/nginx
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - nyumbalink_net

  # ── Certbot (SSL) ───────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: nyumbalink_certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"
    networks:
      - nyumbalink_net

volumes:
  postgres_data:
  redis_data:
  es_data:
  api_logs:
  nginx_logs:
  certbot_conf:
  certbot_www:

networks:
  nyumbalink_net:
    driver: bridge
